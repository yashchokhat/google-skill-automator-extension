<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Automator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="logo">⚡</div>
      <h1>Learning Automator</h1>
      <p class="subtitle">Auto-pilot for online courses</p>
    </div>

    <!-- Toggle Section -->
    <div class="toggle-section">
      <label class="toggle-label" for="automationToggle">
        <span class="toggle-text">Automation</span>
        <span class="status-badge" id="statusBadge">OFF</span>
      </label>
      <label class="switch">
        <input type="checkbox" id="automationToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <!-- Info Section -->
    <div class="info-section">
      <div class="info-row"><span class="icon">🎬</span> Videos → 16× speed, muted, skipped</div>
      <div class="info-row"><span class="icon">🖱️</span> Auto-click Next / Continue / Submit</div>
      <div class="info-row"><span class="icon">☑️</span> Tick all checkboxes</div>
      <div class="info-row"><span class="icon">📜</span> Auto-scroll for lazy loading</div>
    </div>

    <!-- Developer Banner -->
    <a href="https://github.com/yashchokhat" target="_blank" class="dev-banner">
      Developed by<br/>
      <span>YASH P. CHOKHAT</span>
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
